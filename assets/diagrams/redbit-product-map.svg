<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Redbit AI product map</title>
  <desc id="desc">A layered map showing input sources, Redbit workspace modules, model routing, local core, and reusable outputs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ea; stroke-width: 1.5; filter: url(#shadow); }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #64748b; text-transform: uppercase; }
      .chip { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .red { fill: #fff1f2; stroke: #fb7185; }
      .green { fill: #ecfdf5; stroke: #34d399; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .amber { fill: #fffbeb; stroke: #fbbf24; }
      .purple { fill: #f5f3ff; stroke: #a78bfa; }
      .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="72" y="64">Redbit AI Creative Production Workspace</text>
  <text class="subtitle" x="72" y="92">Cards, Workshop, Agent, model registry, provider routing, and local-first asset reuse in one workspace.</text>

  <rect class="panel" x="64" y="132" width="250" height="420" rx="18"/>
  <text class="tiny" x="92" y="168">Inputs</text>
  <rect class="chip green" x="92" y="192" width="166" height="46" rx="12"/>
  <text class="label" x="112" y="221">Prompt ideas</text>
  <rect class="chip green" x="92" y="256" width="166" height="46" rx="12"/>
  <text class="label" x="112" y="285">Images</text>
  <rect class="chip green" x="92" y="320" width="166" height="46" rx="12"/>
  <text class="label" x="112" y="349">Video / audio</text>
  <rect class="chip green" x="92" y="384" width="166" height="46" rx="12"/>
  <text class="label" x="112" y="413">Text assets</text>
  <rect class="chip green" x="92" y="448" width="166" height="46" rx="12"/>
  <text class="label" x="112" y="477">External URLs</text>

  <rect class="panel" x="396" y="116" width="488" height="464" rx="22"/>
  <text class="tiny" x="428" y="154">Workspace</text>
  <rect class="chip red" x="428" y="180" width="188" height="92" rx="16"/>
  <text class="label" x="452" y="217">Cards</text>
  <text class="small" x="452" y="243">Image, video, speech,</text>
  <text class="small" x="452" y="263">describe, audio tasks</text>
  <rect class="chip blue" x="664" y="180" width="188" height="92" rx="16"/>
  <text class="label" x="688" y="217">Workshop</text>
  <text class="small" x="688" y="243">Script, storyboard,</text>
  <text class="small" x="688" y="263">scene media, export</text>
  <rect class="chip amber" x="428" y="318" width="188" height="92" rx="16"/>
  <text class="label" x="452" y="355">Asset Dock</text>
  <text class="small" x="452" y="381">Pinned and recent</text>
  <text class="small" x="452" y="401">reusable assets</text>
  <rect class="chip purple" x="664" y="318" width="188" height="92" rx="16"/>
  <text class="label" x="688" y="355">Agent</text>
  <text class="small" x="688" y="381">Guarded tools,</text>
  <text class="small" x="688" y="401">workspace context</text>
  <rect class="chip" x="516" y="456" width="248" height="58" rx="14"/>
  <text class="label" x="546" y="492">Settings and i18n</text>

  <rect class="panel" x="962" y="132" width="250" height="420" rx="18"/>
  <text class="tiny" x="990" y="168">Execution</text>
  <rect class="chip blue" x="990" y="192" width="166" height="58" rx="12"/>
  <text class="label" x="1010" y="225">Model registry</text>
  <rect class="chip blue" x="990" y="274" width="166" height="58" rx="12"/>
  <text class="label" x="1010" y="307">Payload layer</text>
  <rect class="chip amber" x="990" y="356" width="166" height="58" rx="12"/>
  <text class="label" x="1010" y="389">Direct / relay</text>
  <rect class="chip purple" x="990" y="438" width="166" height="58" rx="12"/>
  <text class="label" x="1010" y="471">Local Core</text>

  <rect class="panel" x="270" y="626" width="740" height="54" rx="16"/>
  <text class="label" x="304" y="660">Outputs: generated media, prompt assets, project archives, FCPXML packages, reusable references</text>

  <path class="line" d="M314 342 C348 342 358 342 396 342"/>
  <path class="line" d="M884 342 C922 342 932 342 962 342"/>
  <path class="dash" d="M522 410 C498 505 455 590 370 626"/>
  <path class="dash" d="M758 410 C794 500 850 590 930 626"/>
  <path class="line" d="M640 514 C640 560 640 586 640 626"/>
</svg>
