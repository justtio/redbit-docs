<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Redbit security and provider boundary</title>
  <desc id="desc">A boundary diagram showing browser-local settings and storage, direct providers, relay providers, optional Local Core, and external effects.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 12px Inter, Arial, sans-serif; fill: #64748b; text-transform: uppercase; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #475569; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .local { fill: #eff6ff; stroke: #60a5fa; }
      .secret { fill: #fff1f2; stroke: #fb7185; }
      .provider { fill: #ecfdf5; stroke: #34d399; }
      .relay { fill: #f5f3ff; stroke: #a78bfa; }
      .external { fill: #fffbeb; stroke: #f59e0b; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="72" y="64">Security and Provider Boundary</text>
  <text class="subtitle" x="72" y="94">Credentials stay in Settings; prompts and media leave only through the configured provider, relay, Local Core, or external integration path.</text>

  <rect class="zone" x="64" y="132" width="546" height="458" rx="24"/>
  <text class="section" x="96" y="174">User browser workspace</text>

  <rect class="secret" x="96" y="210" width="220" height="112" rx="16"/>
  <text class="label" x="126" y="250">Settings</text>
  <text class="small" x="126" y="276">Provider keys, relay,</text>
  <text class="small" x="126" y="296">Agent runtime profile</text>

  <rect class="local" x="358" y="210" width="220" height="112" rx="16"/>
  <text class="label" x="388" y="250">Browser storage</text>
  <text class="small" x="388" y="276">IndexedDB, OPFS,</text>
  <text class="small" x="388" y="296">encrypted or redacted</text>

  <rect class="local" x="96" y="390" width="220" height="112" rx="16"/>
  <text class="label" x="126" y="430">Cards and assets</text>
  <text class="small" x="126" y="456">Prompts, references,</text>
  <text class="small" x="126" y="476">results, Workshop state</text>

  <rect class="local" x="358" y="390" width="220" height="112" rx="16"/>
  <text class="label" x="388" y="430">Agent runtime</text>
  <text class="small" x="388" y="456">Bounded tools and</text>
  <text class="small" x="388" y="476">normalized results</text>

  <path class="line" d="M316 266 H358"/>
  <path class="dash" d="M206 322 V390"/>
  <path class="dash" d="M468 322 V390"/>

  <rect class="zone" x="700" y="132" width="494" height="458" rx="24"/>
  <text class="section" x="732" y="174">Outside the browser boundary</text>

  <rect class="provider" x="732" y="210" width="196" height="102" rx="16"/>
  <text class="label" x="760" y="250">Direct provider</text>
  <text class="small" x="760" y="276">Quota, policy,</text>
  <text class="small" x="760" y="296">retention, billing</text>

  <rect class="relay" x="966" y="210" width="196" height="102" rx="16"/>
  <text class="label" x="994" y="250">Relay provider</text>
  <text class="small" x="994" y="276">Capability-filtered</text>
  <text class="small" x="994" y="296">model support</text>

  <rect class="relay" x="732" y="390" width="196" height="102" rx="16"/>
  <text class="label" x="760" y="430">Local Core</text>
  <text class="small" x="760" y="456">Optional local media,</text>
  <text class="small" x="760" y="476">MCP, storage, FFmpeg</text>

  <rect class="external" x="966" y="390" width="196" height="102" rx="16"/>
  <text class="label" x="994" y="430">External effects</text>
  <text class="small" x="994" y="456">Automation, posting,</text>
  <text class="small" x="994" y="476">real account actions</text>

  <path class="line" d="M578 446 C638 404 662 278 732 262"/>
  <path class="line" d="M578 446 C670 358 846 268 966 262"/>
  <path class="dash" d="M578 446 C630 456 674 452 732 442"/>
  <path class="dash" d="M928 442 H966"/>

  <rect class="zone" x="72" y="624" width="1122" height="54" rx="16"/>
  <text class="section" x="104" y="648">Recovery rule</text>
  <text class="small" x="104" y="670">If a key leaks outside Settings, rotate it at the provider; if a route fails, debug the configured route before retrying batch generation.</text>
</svg>
