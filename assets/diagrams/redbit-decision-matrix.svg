<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Redbit capability selector</title>
  <desc id="desc">A selector diagram that maps task shape to Cards, Series, Workshop, Agent, Seedance, or Model Registry.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 12px Inter, Arial, sans-serif; fill: #64748b; text-transform: uppercase; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .input { fill: #fff1f2; stroke: #fb7185; }
      .cards { fill: #ecfdf5; stroke: #34d399; }
      .series { fill: #eff6ff; stroke: #60a5fa; }
      .workshop { fill: #f5f3ff; stroke: #a78bfa; }
      .agent { fill: #fffbeb; stroke: #f59e0b; }
      .seedance { fill: #eef2ff; stroke: #818cf8; }
      .registry { fill: #f1f5f9; stroke: #94a3b8; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="72" y="64">Redbit Capability Selector</text>
  <text class="subtitle" x="72" y="94">Choose the smallest Redbit surface that matches the shape of the work.</text>

  <rect class="panel" x="62" y="136" width="292" height="446" rx="20"/>
  <text class="section" x="96" y="176">Start with the task shape</text>
  <rect class="input" x="96" y="208" width="224" height="54" rx="14"/>
  <text class="label" x="124" y="241">One task unit?</text>
  <rect class="input" x="96" y="284" width="224" height="54" rx="14"/>
  <text class="label" x="124" y="317">Planned image set?</text>
  <rect class="input" x="96" y="360" width="224" height="54" rx="14"/>
  <text class="label" x="124" y="393">Script or scenes?</text>
  <rect class="input" x="96" y="436" width="224" height="54" rx="14"/>
  <text class="label" x="124" y="469">Multi-step action?</text>
  <rect class="input" x="96" y="512" width="224" height="54" rx="14"/>
  <text class="label" x="124" y="545">Provider question?</text>

  <rect class="panel" x="454" y="120" width="708" height="482" rx="22"/>
  <text class="section" x="492" y="160">Route to the right surface</text>

  <rect class="cards" x="492" y="190" width="250" height="100" rx="16"/>
  <text class="label" x="524" y="230">Cards</text>
  <text class="small" x="524" y="256">Single image, video, audio,</text>
  <text class="small" x="524" y="276">speech, or describe task</text>

  <rect class="series" x="832" y="190" width="250" height="100" rx="16"/>
  <text class="label" x="864" y="230">Series</text>
  <text class="small" x="864" y="256">3, 4, 6, or 8 related</text>
  <text class="small" x="864" y="276">image slots from one prompt</text>

  <rect class="workshop" x="492" y="330" width="250" height="100" rx="16"/>
  <text class="label" x="524" y="370">Workshop</text>
  <text class="small" x="524" y="396">Script, storyboard, scenes,</text>
  <text class="small" x="524" y="416">voice, music, export package</text>

  <rect class="agent" x="832" y="330" width="250" height="100" rx="16"/>
  <text class="label" x="864" y="370">Agent</text>
  <text class="small" x="864" y="396">Reviewable multi-step</text>
  <text class="small" x="864" y="416">workspace tool actions</text>

  <rect class="seedance" x="492" y="470" width="250" height="100" rx="16"/>
  <text class="label" x="524" y="510">Seedance</text>
  <text class="small" x="524" y="536">Text, image, first/last,</text>
  <text class="small" x="524" y="556">or multi-reference video</text>

  <rect class="registry" x="832" y="470" width="250" height="100" rx="16"/>
  <text class="label" x="864" y="510">Model Registry</text>
  <text class="small" x="864" y="536">Provider, relay, variant,</text>
  <text class="small" x="864" y="556">ratio, and capability checks</text>

  <path class="line" d="M320 235 C380 226 420 226 492 240"/>
  <path class="line" d="M320 311 C478 260 684 234 832 240"/>
  <path class="line" d="M320 387 C384 380 420 380 492 380"/>
  <path class="line" d="M320 463 C480 430 690 386 832 380"/>
  <path class="line" d="M320 539 C400 546 426 528 492 520"/>
  <path class="dash" d="M742 520 H832"/>

  <rect class="panel" x="72" y="622" width="1090" height="54" rx="16"/>
  <text class="section" x="104" y="646">Operating rule</text>
  <text class="small" x="104" y="668">If the chosen surface fails, check provider route, model support, references, and whether the Agent or Local Core capability is actually configured.</text>
</svg>
