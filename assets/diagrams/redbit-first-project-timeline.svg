<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Redbit first project walkthrough timeline</title>
  <desc id="desc">A timeline from project brief through provider setup, baseline card, module choice, generation, reuse, export, and handoff.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #475569; }
      .num { font: 700 12px Inter, Arial, sans-serif; fill: #ffffff; }
      .stage { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .brief { fill: #fff1f2; stroke: #fb7185; }
      .setup { fill: #eff6ff; stroke: #60a5fa; }
      .build { fill: #ecfdf5; stroke: #34d399; }
      .assist { fill: #fffbeb; stroke: #f59e0b; }
      .ship { fill: #f5f3ff; stroke: #a78bfa; }
      .dot { fill: #334155; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 7; fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="72" y="64">First Project Walkthrough Timeline</text>
  <text class="subtitle" x="72" y="94">A practical sequence for moving from a small brief to reusable outputs and a clean team handoff.</text>

  <path class="line" d="M132 362 H1128"/>

  <g>
    <circle class="dot" cx="150" cy="362" r="18"/>
    <text class="num" x="146" y="367">1</text>
    <rect class="stage brief" x="80" y="170" width="190" height="124" rx="16"/>
    <text class="label" x="108" y="212">Brief</text>
    <text class="small" x="108" y="238">Goal, input assets,</text>
    <text class="small" x="108" y="258">review rule, boundary</text>
    <path class="dash" d="M150 294 V344"/>
  </g>

  <g>
    <circle class="dot" cx="290" cy="362" r="18"/>
    <text class="num" x="286" y="367">2</text>
    <rect class="stage setup" x="220" y="430" width="190" height="124" rx="16"/>
    <text class="label" x="248" y="472">Provider</text>
    <text class="small" x="248" y="498">Direct route, relay,</text>
    <text class="small" x="248" y="518">or custom model IDs</text>
    <path class="dash" d="M290 380 V430"/>
  </g>

  <g>
    <circle class="dot" cx="430" cy="362" r="18"/>
    <text class="num" x="426" y="367">3</text>
    <rect class="stage build" x="360" y="170" width="190" height="124" rx="16"/>
    <text class="label" x="388" y="212">Baseline Card</text>
    <text class="small" x="388" y="238">Prompt, model, ratio,</text>
    <text class="small" x="388" y="258">status, result, error</text>
    <path class="dash" d="M430 294 V344"/>
  </g>

  <g>
    <circle class="dot" cx="570" cy="362" r="18"/>
    <text class="num" x="566" y="367">4</text>
    <rect class="stage build" x="500" y="430" width="190" height="124" rx="16"/>
    <text class="label" x="528" y="472">Choose Mode</text>
    <text class="small" x="528" y="498">Cards, Series,</text>
    <text class="small" x="528" y="518">Workshop, Agent</text>
    <path class="dash" d="M570 380 V430"/>
  </g>

  <g>
    <circle class="dot" cx="710" cy="362" r="18"/>
    <text class="num" x="706" y="367">5</text>
    <rect class="stage build" x="640" y="170" width="190" height="124" rx="16"/>
    <text class="label" x="668" y="212">Generate</text>
    <text class="small" x="668" y="238">Series slots, scenes,</text>
    <text class="small" x="668" y="258">or video references</text>
    <path class="dash" d="M710 294 V344"/>
  </g>

  <g>
    <circle class="dot" cx="850" cy="362" r="18"/>
    <text class="num" x="846" y="367">6</text>
    <rect class="stage assist" x="780" y="430" width="190" height="124" rx="16"/>
    <text class="label" x="808" y="472">Agent Help</text>
    <text class="small" x="808" y="498">Reviewable tool</text>
    <text class="small" x="808" y="518">actions only</text>
    <path class="dash" d="M850 380 V430"/>
  </g>

  <g>
    <circle class="dot" cx="990" cy="362" r="18"/>
    <text class="num" x="986" y="367">7</text>
    <rect class="stage ship" x="920" y="170" width="190" height="124" rx="16"/>
    <text class="label" x="948" y="212">Reuse</text>
    <text class="small" x="948" y="238">Pin outputs, select</text>
    <text class="small" x="948" y="258">with SmartPicker</text>
    <path class="dash" d="M990 294 V344"/>
  </g>

  <g>
    <circle class="dot" cx="1130" cy="362" r="18"/>
    <text class="num" x="1126" y="367">8</text>
    <rect class="stage ship" x="1060" y="430" width="190" height="124" rx="16"/>
    <text class="label" x="1088" y="472">Export</text>
    <text class="small" x="1088" y="498">Downloads, packages,</text>
    <text class="small" x="1088" y="518">route and notes</text>
    <path class="dash" d="M1130 380 V430"/>
  </g>

  <rect class="stage" x="82" y="622" width="1088" height="54" rx="16"/>
  <text class="label" x="112" y="655">Handoff goal:</text>
  <text class="small" x="242" y="655">another teammate can inspect the Cards, pinned assets, Workshop state, provider route, known failures, and selected exports.</text>
</svg>
